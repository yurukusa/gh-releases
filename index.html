<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gh-releases — GitHub Release Notes Viewer</title>
<meta name="description" content="Browse GitHub release notes for any repository. Search releases, view changelogs, compare versions. No auth required.">
<meta property="og:title" content="gh-releases — GitHub Release Notes Viewer">
<meta property="og:description" content="Browse GitHub release notes for any repository. No auth required.">
<meta property="og:type" content="website">
<link rel="canonical" href="https://yurukusa.github.io/gh-releases/">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.container{max-width:800px;margin:0 auto;padding:24px 16px}
header{text-align:center;margin-bottom:24px}
header h1{font-size:28px;margin-bottom:6px}
header h1 span{color:var(--accent)}
header p{color:var(--muted);font-size:14px}

.search-row{display:flex;gap:8px;margin-bottom:16px}
.search-row input{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px;outline:none}
.search-row input:focus{border-color:var(--accent)}
.search-row button{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.search-row button:hover{opacity:.9}
.search-row button:disabled{opacity:.5;cursor:not-allowed}

.presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.preset{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
.preset:hover{border-color:var(--accent);color:var(--accent)}

.status{text-align:center;color:var(--muted);padding:12px;font-size:14px}
.status.error{color:var(--red)}

.repo-info{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.repo-info .name{font-size:16px;font-weight:600}
.repo-info .meta{display:flex;gap:14px;font-size:13px;color:var(--muted)}

.filter-row{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.filter-row input{flex:1;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;outline:none}
.filter-row label{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer}
.filter-row input[type=checkbox]{accent-color:var(--accent)}

.releases{display:grid;gap:16px}

.release{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.release-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.release-header:hover{background:rgba(88,166,255,.04)}
.release-header .tag{font-family:monospace;font-weight:700;color:var(--green);font-size:15px}
.release-header .info{display:flex;gap:10px;align-items:center;font-size:12px;color:var(--muted)}
.release-header .date{white-space:nowrap}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600}
.badge-latest{background:rgba(63,185,80,.15);color:var(--green)}
.badge-pre{background:rgba(210,153,34,.15);color:var(--yellow)}
.badge-draft{background:rgba(139,148,158,.15);color:var(--muted)}

.release-body{padding:0 16px 16px;display:none;font-size:14px}
.release-body.open{display:block}
.release-body .md{padding-top:8px;overflow-wrap:break-word}
.release-body .md h1,.release-body .md h2,.release-body .md h3{margin:12px 0 6px;font-size:15px;color:var(--text)}
.release-body .md h2{font-size:14px}
.release-body .md h3{font-size:13px;color:var(--muted)}
.release-body .md p{margin:4px 0}
.release-body .md ul,.release-body .md ol{margin:4px 0 4px 20px}
.release-body .md li{margin:2px 0}
.release-body .md code{background:rgba(110,118,129,.2);padding:1px 4px;border-radius:3px;font-size:12px}
.release-body .md pre{background:#0d1117;border:1px solid var(--border);padding:10px;border-radius:4px;overflow-x:auto;margin:6px 0}
.release-body .md pre code{background:none;padding:0}
.release-body .md blockquote{border-left:3px solid var(--border);padding-left:10px;color:var(--muted);margin:6px 0}
.release-body .md a{color:var(--accent)}
.release-body .assets{margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.release-body .assets h4{font-size:12px;color:var(--muted);margin-bottom:4px}
.release-body .asset{font-size:12px;padding:2px 0}
.release-body .asset a{color:var(--accent)}

.loading{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px;border-top:1px solid var(--border);margin-top:32px}
@media(max-width:600px){.search-row{flex-direction:column}.repo-info{flex-direction:column;gap:6px}.filter-row{flex-wrap:wrap}}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1><span>gh</span>-releases</h1>
    <p>Browse GitHub release notes for any repository</p>
  </header>

  <div class="search-row">
    <input type="text" id="repoInput" placeholder="owner/repo (e.g. facebook/react)" autocomplete="off">
    <button id="fetchBtn" onclick="fetchReleases()">Fetch</button>
  </div>

  <div class="presets">
    <span class="preset" onclick="load('facebook/react')">react</span>
    <span class="preset" onclick="load('vuejs/core')">vue</span>
    <span class="preset" onclick="load('sveltejs/svelte')">svelte</span>
    <span class="preset" onclick="load('vercel/next.js')">next.js</span>
    <span class="preset" onclick="load('microsoft/TypeScript')">typescript</span>
    <span class="preset" onclick="load('nodejs/node')">node</span>
    <span class="preset" onclick="load('denoland/deno')">deno</span>
    <span class="preset" onclick="load('vitejs/vite')">vite</span>
    <span class="preset" onclick="load('tailwindlabs/tailwindcss')">tailwind</span>
    <span class="preset" onclick="load('anthropics/claude-code')">claude-code</span>
  </div>

  <div id="status"></div>
  <div id="repoInfo"></div>
  <div id="filterRow" style="display:none"></div>
  <div id="releases" class="releases"></div>
</div>

<footer>
  <p>gh-releases — Data from <a href="https://docs.github.com/en/rest/releases" target="_blank">GitHub API</a> (60 req/hr unauthenticated) | Part of <a href="https://yurukusa.github.io/dev-toolkit/" target="_blank">Dev Toolkit</a></p>
</footer>

<script>
const GH_API = 'https://api.github.com';
const input = document.getElementById('repoInput');
const btn = document.getElementById('fetchBtn');
const statusEl = document.getElementById('status');
const repoEl = document.getElementById('repoInfo');
const filterEl = document.getElementById('filterRow');
const releasesEl = document.getElementById('releases');

let allReleases = [];

input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchReleases(); });

function load(repo) { input.value = repo; fetchReleases(); }

// URL params
const urlRepo = new URLSearchParams(location.search).get('repo');
if (urlRepo) { input.value = urlRepo; fetchReleases(); }

async function fetchReleases() {
  let repo = input.value.trim();
  // Handle full GitHub URLs
  const urlMatch = repo.match(/github\.com\/([^/]+\/[^/]+)/);
  if (urlMatch) repo = urlMatch[1];
  repo = repo.replace(/\.git$/, '').replace(/\/$/, '');

  if (!repo.includes('/')) { statusEl.textContent = 'Enter owner/repo format'; statusEl.className = 'status error'; return; }

  btn.disabled = true;
  statusEl.innerHTML = '<span class="loading"></span> Fetching releases...';
  statusEl.className = 'status';
  repoEl.innerHTML = '';
  filterEl.style.display = 'none';
  releasesEl.innerHTML = '';

  try {
    // Fetch repo info + releases in parallel
    const [repoRes, relRes] = await Promise.all([
      fetch(`${GH_API}/repos/${repo}`),
      fetch(`${GH_API}/repos/${repo}/releases?per_page=30`)
    ]);

    if (!repoRes.ok) throw new Error(`Repository "${repo}" not found`);
    if (!relRes.ok) throw new Error('Failed to fetch releases');

    const repoData = await repoRes.json();
    allReleases = await relRes.json();

    // Repo info
    repoEl.innerHTML = `<div class="repo-info">
      <div class="name"><a href="${repoData.html_url}" target="_blank">${esc(repoData.full_name)}</a></div>
      <div class="meta">
        <span>⭐ ${formatNum(repoData.stargazers_count)}</span>
        <span>${allReleases.length} releases</span>
        <span>${esc(repoData.language || '')}</span>
      </div>
    </div>`;

    // Filter
    filterEl.style.display = 'flex';
    filterEl.innerHTML = `
      <input type="text" id="filterInput" placeholder="Filter releases..." oninput="renderReleases()">
      <label><input type="checkbox" id="hidePrerelease" onchange="renderReleases()"> Hide pre-releases</label>
    `;

    if (allReleases.length === 0) {
      statusEl.textContent = 'No releases found. This repo may use tags instead.';
    } else {
      statusEl.textContent = `${allReleases.length} releases loaded`;
    }

    renderReleases();

    // Update URL
    const url = new URL(location);
    url.searchParams.set('repo', repo);
    history.replaceState(null, '', url);

  } catch (err) {
    statusEl.textContent = err.message;
    statusEl.className = 'status error';
  }
  btn.disabled = false;
}

function renderReleases() {
  const query = (document.getElementById('filterInput')?.value || '').toLowerCase();
  const hidePre = document.getElementById('hidePrerelease')?.checked || false;

  let filtered = allReleases;
  if (hidePre) filtered = filtered.filter(r => !r.prerelease);
  if (query) filtered = filtered.filter(r =>
    r.tag_name.toLowerCase().includes(query) ||
    r.name?.toLowerCase().includes(query) ||
    r.body?.toLowerCase().includes(query)
  );

  releasesEl.innerHTML = filtered.map((r, i) => {
    const date = r.published_at ? new Date(r.published_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
    const badges = [];
    if (i === 0 && !r.prerelease && !r.draft) badges.push('<span class="badge badge-latest">Latest</span>');
    if (r.prerelease) badges.push('<span class="badge badge-pre">Pre-release</span>');
    if (r.draft) badges.push('<span class="badge badge-draft">Draft</span>');

    const body = r.body ? simpleMarkdown(r.body) : '<em style="color:var(--muted)">No release notes</em>';
    const assets = (r.assets || []).filter(a => a.name);

    return `<div class="release">
      <div class="release-header" onclick="toggleRelease(${i})">
        <span class="tag">${esc(r.tag_name)}</span>
        <span class="info">
          ${badges.join(' ')}
          <span class="date">${date}</span>
        </span>
      </div>
      <div class="release-body" id="rel-${i}">
        ${r.name && r.name !== r.tag_name ? `<strong>${esc(r.name)}</strong>` : ''}
        <div class="md">${body}</div>
        ${assets.length ? `<div class="assets"><h4>Assets (${assets.length})</h4>${assets.map(a =>
          `<div class="asset"><a href="${a.browser_download_url}" target="_blank">${esc(a.name)}</a> (${formatBytes(a.size)})</div>`
        ).join('')}</div>` : ''}
        <p style="margin-top:8px;font-size:12px"><a href="${r.html_url}" target="_blank">View on GitHub →</a></p>
      </div>
    </div>`;
  }).join('');

  // Auto-expand first
  if (filtered.length > 0) {
    const first = document.getElementById('rel-0');
    if (first) first.classList.add('open');
  }
}

function toggleRelease(i) {
  const el = document.getElementById(`rel-${i}`);
  if (el) el.classList.toggle('open');
}

function simpleMarkdown(text) {
  // Basic markdown to HTML (no external deps)
  let html = esc(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Links [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Unordered list
  html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Paragraphs (double newline)
  html = html.replace(/\n\n/g, '</p><p>');
  // Single newlines in non-block context
  html = html.replace(/\n/g, '<br>');
  return `<p>${html}</p>`;
}

function formatNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

function formatBytes(b) {
  if (b >= 1e6) return (b/1e6).toFixed(1) + ' MB';
  if (b >= 1e3) return (b/1e3).toFixed(1) + ' KB';
  return b + ' B';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
</script>
</body>
</html>
